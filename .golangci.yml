version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - govet

linters-settings:
  errcheck:
    check-type-assertions: true
  gocyclo:
    min-complexity: 15

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocyclo
