name: Lint, Build & Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  build:
    name: build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -o kopi .
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kopi-linux-amd64
          path: kopi
          retention-days: 1

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build multi-platform binaries
        run: |
          mkdir -p releases
          
          # Linux
          GOOS=linux GOARCH=amd64 go build -o releases/kopi-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o releases/kopi-linux-arm64 .
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -o releases/kopi-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o releases/kopi-darwin-arm64 .
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -o releases/kopi-windows-amd64.exe .
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}